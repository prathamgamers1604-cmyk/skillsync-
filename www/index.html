<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillSync</title>
<style>
:root {
  --purple: #6C63FF; --purple-dark: #4B44CC; --purple-light: #EEF0FF;
  --green: #22C55E; --orange: #F97316; --red: #EF4444; --yellow: #FBBF24;
  --bg: #F5F6FF; --card: #FFFFFF; --text: #1A1A2E; --muted: #6B7280;
  --border: #E5E7EB; --radius: 14px; --shadow: 0 4px 24px rgba(108,99,255,0.10);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.page { display:none; min-height:100vh; flex-direction:column; }
.page.active { display:flex; }
.btn { display:inline-block; padding:0.85rem 2rem; border-radius:50px; border:none; font-size:1rem; font-weight:600; cursor:pointer; transition:all 0.2s; }
.btn:active { transform:scale(0.97); }
.btn-primary { background:var(--purple); color:white; }
.btn-full { width:100%; }
.btn-white { background:white; color:var(--purple); width:100%; max-width:320px; }
.btn-outline { background:transparent; color:white; border:2px solid rgba(255,255,255,0.7); width:100%; max-width:320px; }
.btn-ghost { background:transparent; color:var(--purple); font-weight:600; border:none; cursor:pointer; font-size:0.9rem; }
.btn-sm { padding:0.5rem 1rem; font-size:0.82rem; }

/* SPLASH */
#splash { background:linear-gradient(150deg,#6C63FF 0%,#A78BFA 60%,#C4B5FD 100%); align-items:center; justify-content:center; text-align:center; padding:2rem; }
.splash-logo { font-size:4rem; margin-bottom:0.5rem; }
.splash-title { font-size:2.2rem; font-weight:800; color:white; letter-spacing:-1px; }
.splash-sub { color:rgba(255,255,255,0.8); margin-top:0.5rem; font-size:1rem; margin-bottom:3rem; }
.splash-actions { display:flex; flex-direction:column; align-items:center; gap:0.75rem; width:100%; }

/* AUTH */
#register,#login { background:linear-gradient(150deg,#6C63FF 0%,#A78BFA 100%); align-items:center; justify-content:center; padding:1.5rem; overflow-y:auto; }
.auth-card { background:white; border-radius:20px; padding:2rem 1.5rem; width:100%; max-width:380px; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
.auth-logo { text-align:center; font-size:2rem; margin-bottom:0.25rem; }
.auth-title { text-align:center; font-size:1.4rem; font-weight:800; color:var(--text); margin-bottom:0.25rem; }
.auth-sub { text-align:center; font-size:0.85rem; color:var(--muted); margin-bottom:1.5rem; }
.input-group { margin-bottom:1rem; }
.input-label { font-size:0.82rem; font-weight:600; color:var(--text); margin-bottom:0.4rem; display:block; }
.input-wrap { position:relative; }
.input-wrap .inp-icon { position:absolute; left:0.9rem; top:50%; transform:translateY(-50%); font-size:1rem; }
.auth-input { width:100%; padding:0.85rem 1rem 0.85rem 2.5rem; border:1.5px solid var(--border); border-radius:12px; font-size:0.95rem; outline:none; transition:border 0.2s; background:var(--bg); }
.auth-input:focus { border-color:var(--purple); background:white; }
.auth-input.error { border-color:var(--red); }
.error-msg { color:var(--red); font-size:0.75rem; margin-top:0.3rem; display:none; }
.error-msg.show { display:block; }
.strength-bar { height:4px; border-radius:50px; background:var(--border); margin-top:0.4rem; overflow:hidden; }
.strength-fill { height:100%; border-radius:50px; transition:all 0.3s; width:0%; }
.auth-switch { text-align:center; margin-top:1rem; font-size:0.85rem; color:var(--muted); }

/* BOTTOM NAV */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid var(--border); display:none; justify-content:space-around; align-items:center; padding:0.5rem 0 0.4rem; z-index:100; box-shadow:0 -4px 20px rgba(0,0,0,0.06); }
.bottom-nav.visible { display:flex; }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:1px; font-size:0.62rem; color:var(--muted); cursor:pointer; padding:0.2rem 0.6rem; border-radius:10px; font-weight:500; }
.nav-item .icon { font-size:1.2rem; }
.nav-item.active { color:var(--purple); }
.main-content { padding-bottom:68px; flex:1; overflow-y:auto; }

/* TOPBAR */
.topbar { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.2rem 0.6rem; background:white; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50; }
.topbar-title { font-size:1.15rem; font-weight:700; }
.topbar-logo { font-size:1.3rem; font-weight:800; color:var(--purple); }
.avatar { width:34px; height:34px; border-radius:50%; background:var(--purple); display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:0.85rem; cursor:pointer; }

/* HOME */
.home-hero { background:linear-gradient(135deg,var(--purple) 0%,#A78BFA 100%); padding:1.4rem 1.2rem 1.8rem; color:white; }
.home-greeting { font-size:0.88rem; opacity:0.85; }
.home-name { font-size:1.4rem; font-weight:800; margin-top:2px; }
.home-streak { display:inline-flex; align-items:center; gap:0.4rem; background:rgba(255,255,255,0.2); border-radius:50px; padding:0.3rem 0.8rem; font-size:0.82rem; font-weight:600; margin-top:0.6rem; }
.xp-bar-wrap { margin-top:0.9rem; }
.xp-label { display:flex; justify-content:space-between; font-size:0.75rem; opacity:0.85; margin-bottom:0.35rem; }
.xp-bar { background:rgba(255,255,255,0.3); border-radius:50px; height:7px; }
.xp-fill { background:white; border-radius:50px; height:7px; width:0%; transition:width 1s; }
.section-header { display:flex; align-items:center; justify-content:space-between; padding:1.1rem 1.2rem 0.5rem; }
.section-title { font-size:0.98rem; font-weight:700; }
.see-all { font-size:0.8rem; color:var(--purple); font-weight:600; cursor:pointer; }
.scroll-row { display:flex; gap:0.7rem; padding:0 1.2rem 0.5rem; overflow-x:auto; scrollbar-width:none; }
.scroll-row::-webkit-scrollbar { display:none; }
.course-card { min-width:210px; background:white; border-radius:var(--radius); padding:1rem; box-shadow:var(--shadow); cursor:pointer; transition:transform 0.2s; }
.course-card:active { transform:scale(0.97); }
.course-emoji { font-size:1.8rem; margin-bottom:0.4rem; }
.course-tag { display:inline-block; background:var(--purple-light); color:var(--purple); font-size:0.68rem; font-weight:600; padding:0.18rem 0.55rem; border-radius:50px; margin-bottom:0.35rem; }
.course-title { font-size:0.88rem; font-weight:700; margin-bottom:0.5rem; }
.progress-row { display:flex; align-items:center; gap:0.5rem; }
.mini-bar { flex:1; background:var(--border); border-radius:50px; height:4px; }
.mini-fill { background:var(--purple); border-radius:50px; height:4px; }
.progress-pct { font-size:0.7rem; color:var(--muted); font-weight:600; }
.goals-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.7rem; padding:0 1.2rem; }
.goal-card { background:white; border-radius:var(--radius); padding:0.9rem; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:0.3rem; }
.goal-icon { font-size:1.4rem; }
.goal-label { font-size:0.72rem; color:var(--muted); }
.goal-value { font-size:1.15rem; font-weight:800; }
.goal-done { color:var(--green); }

/* QUICK ACTIONS */
.qa-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:0.6rem; padding:0 1.2rem; }
.qa-item { background:white; border-radius:12px; padding:0.75rem 0.5rem; text-align:center; cursor:pointer; box-shadow:var(--shadow); transition:transform 0.2s; }
.qa-item:active { transform:scale(0.95); }
.qa-icon { font-size:1.5rem; }
.qa-label { font-size:0.65rem; font-weight:600; color:var(--muted); margin-top:0.3rem; }

/* JOBS PAGE */
#jobs { background:var(--bg); }
.job-search { padding:0.8rem 1.2rem 0; }
.job-search-box { display:flex; gap:0.5rem; }
.job-search-box input { flex:1; padding:0.75rem 1rem; border:1.5px solid var(--border); border-radius:50px; font-size:0.9rem; outline:none; background:white; }
.job-search-box input:focus { border-color:var(--purple); }
.filter-row { display:flex; gap:0.5rem; padding:0.6rem 1.2rem; overflow-x:auto; scrollbar-width:none; }
.filter-row::-webkit-scrollbar { display:none; }
.chip { white-space:nowrap; padding:0.38rem 0.9rem; border-radius:50px; font-size:0.78rem; font-weight:600; cursor:pointer; border:1.5px solid var(--border); background:white; color:var(--muted); transition:all 0.15s; }
.chip.active { background:var(--purple); color:white; border-color:var(--purple); }
.job-list { padding:0 1.2rem 1rem; }
.job-card { background:white; border-radius:var(--radius); padding:1rem; margin-bottom:0.75rem; box-shadow:var(--shadow); cursor:pointer; transition:transform 0.15s; }
.job-card:active { transform:scale(0.98); }
.job-top { display:flex; align-items:flex-start; gap:0.75rem; margin-bottom:0.6rem; }
.job-logo { width:42px; height:42px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.4rem; flex-shrink:0; }
.job-info { flex:1; }
.job-title { font-size:0.92rem; font-weight:700; }
.job-company { font-size:0.8rem; color:var(--muted); margin-top:1px; }
.job-match { background:var(--green); color:white; font-size:0.68rem; font-weight:700; padding:0.2rem 0.55rem; border-radius:50px; }
.job-tags { display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:0.6rem; }
.job-tag { background:var(--purple-light); color:var(--purple); font-size:0.7rem; font-weight:600; padding:0.18rem 0.55rem; border-radius:50px; }
.job-footer { display:flex; justify-content:space-between; align-items:center; }
.job-meta { font-size:0.75rem; color:var(--muted); }
.apply-btn { background:var(--purple); color:white; border:none; border-radius:50px; padding:0.4rem 1rem; font-size:0.78rem; font-weight:600; cursor:pointer; }

/* RESUME PAGE */
#resume-page { background:var(--bg); }
.resume-tabs { display:flex; background:white; border-bottom:1px solid var(--border); }
.res-tab { flex:1; text-align:center; padding:0.85rem; font-size:0.85rem; font-weight:600; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; }
.res-tab.active { color:var(--purple); border-bottom-color:var(--purple); }
.res-panel { display:none; padding:1rem 1.2rem; }
.res-panel.active { display:block; }
.upload-zone { border:2px dashed var(--purple); border-radius:16px; padding:2.5rem 1.5rem; text-align:center; background:var(--purple-light); cursor:pointer; margin-bottom:1rem; }
.upload-zone .up-icon { font-size:3rem; margin-bottom:0.5rem; }
.upload-zone .up-title { font-size:1rem; font-weight:700; color:var(--purple); }
.upload-zone .up-sub { font-size:0.8rem; color:var(--muted); margin-top:0.3rem; }
.res-section { background:white; border-radius:var(--radius); padding:1rem; margin-bottom:0.75rem; box-shadow:var(--shadow); }
.res-section-title { font-size:0.85rem; font-weight:700; color:var(--purple); margin-bottom:0.75rem; display:flex; align-items:center; gap:0.4rem; }
.res-field { margin-bottom:0.75rem; }
.res-label { font-size:0.75rem; font-weight:600; color:var(--muted); margin-bottom:0.3rem; }
.res-input { width:100%; padding:0.65rem 0.85rem; border:1.5px solid var(--border); border-radius:10px; font-size:0.88rem; outline:none; transition:border 0.2s; }
.res-input:focus { border-color:var(--purple); }
.res-row { display:grid; grid-template-columns:1fr 1fr; gap:0.6rem; }
.skill-chips { display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.4rem; }
.skill-chip { background:var(--purple-light); color:var(--purple); font-size:0.75rem; font-weight:600; padding:0.25rem 0.65rem; border-radius:50px; display:flex; align-items:center; gap:0.3rem; }
.skill-chip .rm { cursor:pointer; opacity:0.6; }
.add-skill-row { display:flex; gap:0.5rem; margin-top:0.5rem; }
.add-skill-row input { flex:1; padding:0.5rem 0.75rem; border:1.5px solid var(--border); border-radius:50px; font-size:0.82rem; outline:none; }
.parsed-card { background:linear-gradient(135deg,var(--purple) 0%,#A78BFA 100%); border-radius:16px; padding:1.2rem; color:white; margin-bottom:1rem; }
.parsed-name { font-size:1.2rem; font-weight:800; }
.parsed-email { font-size:0.82rem; opacity:0.85; margin-top:2px; }
.parsed-skills { display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.75rem; }
.parsed-skill { background:rgba(255,255,255,0.2); border-radius:50px; padding:0.2rem 0.6rem; font-size:0.72rem; font-weight:600; }
.match-score { display:flex; align-items:center; gap:1rem; background:white; border-radius:16px; padding:1rem; margin-bottom:0.75rem; box-shadow:var(--shadow); }
.score-circle { width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.1rem; font-weight:800; color:white; flex-shrink:0; }
.score-info { flex:1; }
.score-title { font-size:0.9rem; font-weight:700; }
.score-sub { font-size:0.75rem; color:var(--muted); margin-top:2px; }

/* AI CHAT */
#aichat { background:var(--bg); }
.chat-messages { flex:1; overflow-y:auto; padding:1rem 1.2rem; padding-bottom:80px; display:flex; flex-direction:column; gap:0.75rem; }
.msg { max-width:85%; padding:0.85rem 1rem; border-radius:16px; font-size:0.88rem; line-height:1.6; }
.msg-ai { background:white; color:var(--text); border-radius:16px 16px 16px 4px; box-shadow:var(--shadow); align-self:flex-start; }
.msg-ai .msg-name { font-size:0.7rem; font-weight:700; color:var(--purple); margin-bottom:0.3rem; }
.msg-user { background:var(--purple); color:white; border-radius:16px 16px 4px 16px; align-self:flex-end; }
.chat-input-wrap { position:fixed; bottom:68px; left:0; right:0; background:white; border-top:1px solid var(--border); padding:0.75rem 1rem; display:flex; gap:0.6rem; z-index:50; }
.chat-input-wrap input { flex:1; padding:0.7rem 1rem; border:1.5px solid var(--border); border-radius:50px; font-size:0.9rem; outline:none; }
.chat-input-wrap input:focus { border-color:var(--purple); }
.send-btn { background:var(--purple); border:none; border-radius:50%; width:42px; height:42px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.1rem; flex-shrink:0; }
.typing-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--muted); margin:0 2px; animation:bounce 1s infinite; }
.typing-dot:nth-child(2) { animation-delay:0.15s; }
.typing-dot:nth-child(3) { animation-delay:0.3s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
.quick-replies { display:flex; gap:0.5rem; flex-wrap:wrap; padding:0 1.2rem 0.5rem; }
.qr-btn { background:var(--purple-light); color:var(--purple); border:none; border-radius:50px; padding:0.4rem 0.9rem; font-size:0.78rem; font-weight:600; cursor:pointer; }

/* MOCK INTERVIEW */
#interview { background:var(--bg); }
.int-hero { background:linear-gradient(135deg,var(--purple) 0%,#A78BFA 100%); padding:1.5rem 1.2rem; color:white; text-align:center; }
.int-hero h2 { font-size:1.2rem; font-weight:800; }
.int-hero p { font-size:0.82rem; opacity:0.85; margin-top:0.3rem; }
.int-card { background:white; border-radius:var(--radius); padding:1.2rem; margin:0.75rem 1.2rem 0; box-shadow:var(--shadow); }
.int-q { font-size:0.95rem; font-weight:700; margin-bottom:0.75rem; line-height:1.5; }
.int-textarea { width:100%; border:1.5px solid var(--border); border-radius:12px; padding:0.85rem; font-size:0.88rem; resize:none; outline:none; min-height:100px; font-family:inherit; }
.int-textarea:focus { border-color:var(--purple); }
.int-tip { background:var(--purple-light); border-radius:10px; padding:0.75rem; margin-top:0.75rem; font-size:0.8rem; color:var(--purple-dark); }
.int-tip strong { display:block; margin-bottom:0.2rem; }
.feedback-card { background:white; border-radius:var(--radius); padding:1rem; margin:0.75rem 1.2rem 0; box-shadow:var(--shadow); display:none; }
.feedback-score { font-size:2rem; font-weight:800; color:var(--purple); text-align:center; }
.feedback-label { text-align:center; font-size:0.82rem; color:var(--muted); }
.feedback-points { margin-top:0.75rem; }
.feedback-point { display:flex; align-items:flex-start; gap:0.5rem; font-size:0.82rem; margin-bottom:0.4rem; line-height:1.5; }

/* SALARY CALC */
#salary { background:var(--bg); }
.sal-hero { background:linear-gradient(135deg,#22C55E 0%,#16A34A 100%); padding:1.5rem 1.2rem; color:white; }
.sal-hero h2 { font-size:1.2rem; font-weight:800; }
.sal-hero p { font-size:0.82rem; opacity:0.85; margin-top:0.3rem; }
.sal-form { padding:1rem 1.2rem; }
.sal-field { margin-bottom:0.9rem; }
.sal-label { font-size:0.82rem; font-weight:600; margin-bottom:0.4rem; display:block; }
.sal-select { width:100%; padding:0.75rem 1rem; border:1.5px solid var(--border); border-radius:12px; font-size:0.9rem; outline:none; background:white; }
.sal-select:focus { border-color:var(--purple); }
.sal-result { background:white; border-radius:var(--radius); padding:1.2rem; margin:0 1.2rem 1rem; box-shadow:var(--shadow); display:none; }
.sal-range { text-align:center; padding:1rem 0; }
.sal-low { font-size:0.82rem; color:var(--muted); }
.sal-mid { font-size:2rem; font-weight:800; color:var(--purple); margin:0.3rem 0; }
.sal-high { font-size:0.82rem; color:var(--muted); }
.sal-bar-wrap { margin:0.75rem 0; }
.sal-bar { height:10px; background:var(--border); border-radius:50px; overflow:hidden; }
.sal-fill { height:100%; background:linear-gradient(90deg,var(--purple),#A78BFA); border-radius:50px; transition:width 1s; }
.sal-insights { display:grid; grid-template-columns:1fr 1fr; gap:0.6rem; margin-top:0.75rem; }
.sal-insight { background:var(--bg); border-radius:10px; padding:0.75rem; text-align:center; }
.sal-insight-val { font-size:1rem; font-weight:800; color:var(--purple); }
.sal-insight-label { font-size:0.7rem; color:var(--muted); margin-top:2px; }

/* PROFILE */
#profile { background:var(--bg); }
.profile-hero { background:linear-gradient(135deg,var(--purple) 0%,#A78BFA 100%); padding:1.8rem 1.2rem 1.4rem; display:flex; flex-direction:column; align-items:center; text-align:center; color:white; }
.profile-pic { width:76px; height:76px; border-radius:50%; background:rgba(255,255,255,0.25); border:3px solid white; display:flex; align-items:center; justify-content:center; font-size:2rem; margin-bottom:0.7rem; }
.profile-name { font-size:1.25rem; font-weight:800; }
.profile-email { font-size:0.8rem; opacity:0.8; margin-top:2px; }
.badges-row { display:flex; gap:0.45rem; margin-top:0.65rem; flex-wrap:wrap; justify-content:center; }
.badge { background:rgba(255,255,255,0.2); border-radius:50px; padding:0.22rem 0.65rem; font-size:0.72rem; font-weight:600; }
.stats-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.7rem; padding:0.9rem 1.2rem; }
.stat-box { background:white; border-radius:12px; padding:0.8rem; text-align:center; box-shadow:var(--shadow); }
.stat-val { font-size:1.3rem; font-weight:800; color:var(--purple); }
.stat-label { font-size:0.68rem; color:var(--muted); margin-top:2px; }
.menu-list { padding:0 1.2rem 1rem; }
.menu-item { display:flex; align-items:center; gap:0.8rem; background:white; border-radius:12px; padding:0.9rem 1rem; margin-bottom:0.5rem; box-shadow:0 2px 8px rgba(0,0,0,0.04); cursor:pointer; font-size:0.88rem; font-weight:600; transition:all 0.15s; }
.menu-item:active { transform:scale(0.98); }
.menu-icon { font-size:1.15rem; width:26px; text-align:center; }
.menu-arrow { margin-left:auto; color:var(--muted); }

/* LESSON */
#lesson { background:white; }
.lesson-header { background:var(--purple); padding:0.9rem 1.2rem; color:white; display:flex; align-items:center; gap:0.7rem; }
.back-btn { background:rgba(255,255,255,0.2); border:none; color:white; border-radius:50px; padding:0.3rem 0.8rem; font-size:0.82rem; cursor:pointer; font-weight:600; }
.lesson-title-small { font-size:0.92rem; font-weight:700; flex:1; }
.lesson-progress-bar { height:4px; background:rgba(108,99,255,0.15); }
.lesson-progress-fill { height:4px; background:var(--purple); transition:width 0.4s; }
.lesson-body { padding:1.4rem 1.2rem; flex:1; overflow-y:auto; }
.lesson-step { display:none; }
.lesson-step.active { display
